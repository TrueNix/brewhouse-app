name: Release

# Build installable artifacts for every supported platform and attach them to
# a GitHub Release. Triggered by pushing a version tag (e.g. `v0.1.0`) or run
# manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build · ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Universal)
            os: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - label: Linux (x86_64)
            os: ubuntu-22.04
            rust_targets: ""
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: brewhouse-v__VERSION__
          releaseName: Brewhouse v__VERSION__
          releaseBody: |
            ## Brewhouse v__VERSION__

            Desktop builds of the Homebrew GUI.

            **macOS** — download the `.dmg`. Builds are unsigned, so on first launch
            either right-click the app and choose **Open**, or run:
            `xattr -dr com.apple.quarantine /Applications/Brewhouse.app`

            **Linux** — download the `.AppImage` (portable) or `.deb`. Requires
            [Homebrew on Linux](https://docs.brew.sh/Homebrew-on-Linux).
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
