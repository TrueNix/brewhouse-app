name: Release

# Build the macOS app bundle and attach it to a GitHub Release. Triggered by
# pushing a version tag (e.g. `v0.1.0`) or run manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build · macOS (Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: brewhouse-v__VERSION__
          releaseName: Brewhouse v__VERSION__
          releaseBody: |
            ## Brewhouse v__VERSION__

            Download the **`.dmg`** (universal: Apple Silicon + Intel).

            The build is unsigned, so on first launch either right-click the app
            and choose **Open**, or run:
            `xattr -dr com.apple.quarantine /Applications/Brewhouse.app`
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
